    STONE: 1
    DIRT: 1
    GRASS_BLOCK: 1
    SAND: 1
    SANDSTONE: 1
    NETHERRACK: 1
    COAL_ORE: 5
    IRON_ORE: 10
    GOLD_ORE: 20
    LAPIS_ORE: 25
    REDSTONE_ORE: 25
    DIAMOND_ORE: 100
    EMERALD_ORE: 125
    IRON_BLOCK: 90
    GOLD_BLOCK: 180
    DIAMOND_BLOCK: 900
    EMERALD_BLOCK: 1000
