      - "ICE:2"
      - "LAVA_BUCKET:1"
      - "BREAD:16"
      - "STONE_AXE:1"
      - "STONE_PICKAXE:1"
      - "STONE_SHOVEL:1"
  desert:
    display-name: "&eDesert Island"
    lore:
      - "&7Pulau gurun berukuran 10x10"
      - "&7dengan pasir dan chest starter desert."
