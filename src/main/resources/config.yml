# ==========================================
# AcidIsland Config File
# Oceanfix10: starter border fallback 15 and deep structures at 60 blocks.
# ==========================================

# Versi template config.
config-version: 18

# Nama world tempat pulau AcidIsland dibuat.
# acid-world adalah key aktif; world-name tetap dibaca sebagai fallback legacy.
acid-world: "acid_island_world"
world-name: "acid_island_world"

# Guard untuk mencegah spam error save Paper jika folder world/data hilang saat server hidup.
world-storage:
  repair-missing-directories: true
  repair-interval-ticks: 1200

# Jarak antar pulau dalam block (agar border tidak bertubrukan)
island-spacing: 400

# Index grid awal. 1 membuat island pertama tidak tepat di spawn dunia acid.
island-start-grid-index: 1

# Bentuk starter island dan struktur eksplorasi.
starter-island:
  # Surface island = acid-water.height + offset. 0 berarti permukaan pulau sejajar permukaan air.
  surface-offset-above-water: 0
  # 0/0 membuat shipwreck berada tepat di bawah island, bukan di samping island.
  shipwreck-offset-x: 0
  shipwreck-offset-z: 0
  # Struktur bawah island random: 50 berarti 50% monument, sisanya shipwreck.
  monument-chance-percent: 50
  # Kedalaman struktur dari permukaan air.
  shipwreck-depth-below-water: 60
  monument-depth-below-water: 60

# Cooldown create/delete island untuk mencegah farming reset island.
cooldowns:
  create-seconds: 120
  delete-seconds: 120

# Koordinat lobby awal (akan diisi via /ai setlobby)
lobby:
  world: "world"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# Pengaturan air beracun (Acid Water)
acid-water:
  enabled: true
  # Tinggi permukaan air beracun (Y level)
  height: 62
  # Damage yang diberikan setiap interval (2.0 = 1 heart)
  damage-amount: 4.0
  # Interval damage dalam detik
  damage-interval: 2
  # Apakah memberi efek poison?
  poison-effect:
    enabled: false
    duration-seconds: 3
    amplifier: 1

# Pengaturan hujan asam (Acid Rain)
acid-rain:
  enabled: false
  # Damage yang diberikan setiap interval (2.0 = 1 heart)
  damage-amount: 1.0
  # Interval damage dalam detik
  damage-interval: 3

# Optimasi runtime ringan.
optimization:
  # Interval pengecekan acid/rain. 40 tick = 2 detik.
  acid-task-interval-ticks: 40

# Integrasi plugin eksternal.
integrations:
  conversecraft:
    enabled: true
    # Jika conversation dengan nama di bawah selesai normal, story-stage player naik otomatis.
    sync-stage-from-completed-conversations: true
    # Saat story-stage AcidIsland berubah, flag ConverseCraft ikut diset:
    # acidisland.story.stage.1, acidisland.story.stage.2, dst.
    sync-flags-to-conversecraft: true
    only-increase-stage: true
    enforce-sequential: true
    notify-stage-up: true
    flag-prefix: "acidisland.story.stage."
    max-stage-flags: 10
    story-stage-conversations:
      acidisland_chapter_1: 1
      acidisland_chapter_2: 2
      acidisland_chapter_3: 3
  ultracosmetics:
    enabled: true

